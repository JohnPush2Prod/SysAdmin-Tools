name: Syft SBOM → Grype Scan

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # nightly

permissions:
  contents: read
  actions: read

jobs:
  syft:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
 
  grype:
    name: Scan SBOM (Grype)
    runs-on: ubuntu-latest
    needs: syft
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom

      - name: Install Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin

      - name: Update Grype DB
        run: grype db update

      - name: Scan SBOM with Grype
        run: |
          grype sbom:sbom/sbom.spdx.json \
            --output sarif \
            --fail-on high \
            --only-fixed
