
name: TruffleHog Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # nightly

permissions:
  contents: read
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR / push scan (diff‑based)
      - name: Run TruffleHog (PR / Push)
        if: github.event_name != 'schedule'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --json --only-verified

      # Nightly full repository scan
      - name: Run TruffleHog (Nightly full repo)
        if: github.event_name == 'schedule'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --json --only-verified
